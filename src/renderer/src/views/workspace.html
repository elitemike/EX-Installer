<div class="h-screen w-screen flex flex-col bg-gray-950 text-white overflow-hidden">

    <!-- ── Title bar / menu bar ─────────────────────────────────────── -->
    <div class="flex items-center gap-3 px-4 py-2 bg-gray-900 border-b border-white/10 select-none">

        <!-- Logo + home button -->
        <button click.trigger="goHome()"
            class="flex items-center gap-2 text-blue-400 hover:text-white transition-colors text-sm font-semibold">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            EX-Installer
        </button>

        <!-- DEV MOCK badge -->
        <span if.bind="isMock"
            class="px-2 py-0.5 rounded text-xs font-bold bg-amber-500/20 text-amber-400 border border-amber-500/30 select-none">DEV
            MOCK</span>

        <span class="text-gray-600">›</span>

        <!-- Device / product selector button -->
        <div class="relative">
            <button click.trigger="toggleDeviceMenu()"
                class="flex items-center gap-2 px-3 py-1 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm transition-colors">
                <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-4M9 3l6 6M9 3v6h6" />
                </svg>
                <span class="font-medium">${activeConfigName}</span>
                <span class="text-gray-400">—</span>
                <span class="text-blue-300">${productName}</span>
                <span class="text-gray-500 text-xs">${state.selectedVersion}</span>
                <svg class.bind="showDeviceMenu ? 'rotate-180' : ''"
                    class="w-3 h-3 text-gray-400 ml-1 transition-transform" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>

            <!-- Dropdown menu -->
            <div if.bind="showDeviceMenu"
                class="absolute left-0 top-full mt-1 w-72 bg-gray-900 border border-white/10 rounded-xl shadow-2xl z-50 overflow-hidden">
                <div class="px-3 pt-3 pb-1">
                    <p class="text-gray-500 text-xs uppercase tracking-wider font-semibold">Recent Devices</p>
                </div>
                <div repeat.for="cfg of savedConfigs"
                    class="flex items-center gap-2 px-3 py-2.5 hover:bg-white/5 transition-colors"
                    class.bind="cfg.id === state.activeConfigId ? 'bg-blue-950/50' : ''">
                    <!-- Main clickable area -->
                    <div click.trigger="switchToConfig(cfg)"
                        class="flex items-start gap-3 flex-1 min-w-0 cursor-pointer">
                        <div class="w-2 h-2 rounded-full mt-1.5 shrink-0"
                            class.bind="cfg.id === state.activeConfigId ? 'bg-blue-400' : 'bg-gray-600'"></div>
                        <div class="min-w-0">
                            <p class="text-white text-sm truncate">${cfg.name}</p>
                            <p class="text-gray-400 text-xs">${cfg.deviceName} · ${cfg.productName} · ${cfg.version}
                            </p>
                        </div>
                    </div>
                    <!-- Delete button -->
                    <button click.trigger="deleteConfig(cfg, $event)" title="Remove device"
                        class="shrink-0 p-1 rounded text-gray-600 hover:text-red-400 hover:bg-red-400/10 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
                <div class="border-t border-white/10 p-2">
                    <button click.trigger="addNewDevice()"
                        class="w-full text-left flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/10 text-blue-400 text-sm transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Add New Device
                    </button>
                </div>
            </div>
        </div>

        <!-- Port badge (clickable rescan) -->
        <button click.trigger="rescanPort()" title="Change port — click to rescan connected boards"
            class="ml-1 flex items-center gap-1 px-2 py-0.5 bg-gray-800 hover:bg-gray-700 rounded text-xs font-mono transition-colors"
            class.bind="state.selectedDevice?.port ? 'text-gray-400 hover:text-white' : 'text-amber-400 hover:text-amber-300'">
            <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            ${state.selectedDevice?.port || 'No port — click to select'}
        </button>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- ── COMPILE button (dev/mock mode only) ── -->
        <button if.bind="isMock" click.trigger="compile()" disabled.bind="isCompiling || !canCompile"
            title.bind="!canCompile ? 'Select a device with a port before compiling' : ''"
            class="flex items-center gap-2 px-5 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-700 disabled:text-gray-500 rounded-lg text-white font-semibold text-sm transition-colors shadow-lg shadow-blue-900/30">
            <svg if.bind="!isCompiling" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
            </svg>
            <svg if.bind="isCompiling" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            ${isCompiling ? 'Compiling...' : 'Compile'}
        </button>

        <!-- ── COMPILE & UPLOAD button (production only) ── -->
        <button if.bind="!isMock" click.trigger="compileAndUpload()" disabled.bind="isCompiling || !canCompile"
            title.bind="!canCompile ? 'Select a device with a port before compiling' : ''"
            class="flex items-center gap-2 px-5 py-2 bg-green-600 hover:bg-green-500 disabled:bg-gray-700 disabled:text-gray-500 rounded-lg text-white font-semibold text-sm transition-colors shadow-lg shadow-green-900/30">
            <svg if.bind="!isCompiling" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <svg if.bind="isCompiling" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
            </svg>
            ${isCompiling ? 'Compiling...' : 'Compile & Upload'}
        </button>

        <!-- Save button -->
        <button click.trigger="saveFiles()"
            class="flex items-center gap-1.5 px-3 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-sm text-gray-300 hover:text-white transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
            </svg>
            Save
        </button>

        <!-- Monitor button -->
        <button click.trigger="toggleMonitor()"
            class="flex items-center gap-1.5 px-3 py-2 border rounded-lg text-sm transition-colors" class.bind="showMonitor
                    ? 'bg-green-700/40 border-green-500/50 text-green-300 hover:bg-green-700/60'
                    : 'bg-white/5 hover:bg-white/10 border-white/10 text-gray-300 hover:text-white'">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Monitor
        </button>
    </div>

    <!-- ── Progress bar ──────────────────────────────────────────────── -->
    <compile-progress if.bind="isCompiling"></compile-progress>

    <!-- ── Splitter: editor (top) + output/monitor (bottom) ─────────────── -->
    <div id="workspace-splitter" class="flex-1 overflow-hidden">

        <!-- PANE 1: file tabs + editor -->
        <div class="flex overflow-hidden">

            <!-- File tabs (left strip if many files; top tab bar for few) -->
            <div class="flex flex-col bg-gray-900/60 border-r border-white/10 min-w-40 overflow-y-auto">
                <div class="flex items-center px-3 pt-3 pb-1">
                    <p class="text-gray-500 text-xs uppercase tracking-wider font-semibold flex-1">Configuration</p>
                    <button click.trigger="startNewFile()" title="New custom file"
                        class="w-5 h-5 flex items-center justify-center rounded text-gray-500 hover:text-white hover:bg-white/10 transition-colors text-base leading-none font-bold">+</button>
                </div>

                <!-- New file inline input -->
                <div if.bind="showNewFileInput" class="px-2 pb-2 flex flex-col gap-1">
                    <input type="text" value.bind="newFileName" keydown.trigger="handleNewFileKeydown($event)"
                        placeholder="filename.h" autofocus
                        class="w-full bg-gray-800 border border-blue-500/60 text-gray-100 rounded px-2 py-1 text-xs outline-none focus:border-blue-400 transition-colors" />
                    <div if.bind="newFileError" class="text-red-400 text-xs px-1">${newFileError}</div>
                    <div class="flex gap-1">
                        <button click.trigger="confirmNewFile()"
                            class="flex-1 px-2 py-1 text-xs rounded bg-blue-600 hover:bg-blue-500 text-white transition-colors">Create</button>
                        <button click.trigger="cancelNewFile()"
                            class="px-2 py-1 text-xs rounded bg-white/5 hover:bg-white/10 text-gray-400 transition-colors">Cancel</button>
                    </div>
                </div>

                <div repeat.for="file of state.configFiles" click.trigger="setActiveFile($index)"
                    class="group flex items-center gap-2 px-3 py-2 text-sm cursor-pointer transition-colors border-l-2"
                    class.bind="activeFileIndex === $index
                        ? 'border-blue-500 bg-blue-950/40 text-white'
                        : 'border-transparent text-gray-400 hover:text-white hover:bg-white/5'">
                    <svg class="w-3.5 h-3.5 shrink-0 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5l5 5v11a2 2 0 01-2 2z" />
                    </svg>
                    <span class="flex flex-col min-w-0 flex-1">
                        <span class="truncate">${friendlyName(file.name)}</span>
                        <span class="truncate text-xs opacity-40 font-mono"
                            if.bind="friendlyName(file.name) !== file.name">${file.name}</span>
                    </span>
                    <!-- Delete button: only shown on custom (user-created) files -->
                    <button if.bind="configEditorState.isCustomFile(file.name)"
                        click.trigger="removeCustomFile($index, $event)" title="Delete ${file.name}"
                        class="shrink-0 w-4 h-4 flex items-center justify-center rounded text-gray-600 hover:text-red-400 hover:bg-red-400/10 opacity-0 group-hover:opacity-100 transition-all">×</button>
                </div>
            </div>

            <!-- Editor pane -->
            <div class="flex flex-col flex-1 overflow-hidden" style="min-height:0;">
                <file-editor-panel active-file-index.bind="activeFileIndex"
                    class="flex flex-col flex-1"></file-editor-panel>
            </div>
        </div>

        <!-- PANE 2: unified output / monitor -->
        <div class="flex flex-col bg-gray-900 overflow-hidden">

            <!-- Tab bar -->
            <div class="flex items-center gap-1 px-2 bg-gray-900 border-b border-white/10 select-none shrink-0"
                style="min-height: 36px;">
                <button click.trigger="setBottomTab('output')" class="px-3 py-1.5 text-xs rounded-t transition-colors"
                    class.bind="activeBottomTab === 'output' ? 'text-white bg-gray-800 border-b-2 border-blue-500' : 'text-gray-400 hover:text-white'">
                    Output
                </button>
                <button if.bind="showMonitor" click.trigger="setBottomTab('monitor')"
                    class="px-3 py-1.5 text-xs rounded-t transition-colors"
                    class.bind="activeBottomTab === 'monitor' ? 'text-white bg-gray-800 border-b-2 border-green-500' : 'text-gray-400 hover:text-white'">
                    Monitor
                </button>
                <div class="flex-1"></div>
                <span if.bind="compileSuccess === true && activeBottomTab === 'output'"
                    class="text-green-400 text-xs mr-2">✓ Success</span>
                <span if.bind="compileSuccess === false && activeBottomTab === 'output'"
                    class="text-red-400 text-xs mr-2">✗ Failed</span>
                <span if.bind="isCompiling && activeBottomTab === 'output'"
                    class="text-blue-400 text-xs mr-2">Compiling…</span>
                <button if.bind="activeBottomTab === 'output'" click.trigger="clearCompileLog()"
                    class="text-gray-600 hover:text-white text-xs mr-2 transition-colors">✕ Clear</button>
                <button click.trigger="closeBottomPanel()" title="Close panel"
                    class="text-gray-600 hover:text-white text-sm leading-none transition-colors mr-1">✕</button>
            </div>

            <!-- Output content (removed from DOM when on Monitor tab, log persists in view model) -->
            <div if.bind="activeBottomTab === 'output'"
                class="flex-1 overflow-y-auto p-4 font-mono text-xs leading-relaxed">
                <div if.bind="compileError" class="text-red-400 mb-2">${compileError}</div>
                <pre class="text-gray-300 whitespace-pre-wrap">${compileLog}</pre>
            </div>

            <!-- Monitor content: in DOM only when showMonitor is on, hidden via Tailwind when Output tab is active -->
            <div if.bind="showMonitor" class="flex-1 overflow-hidden"
                class.bind="activeBottomTab !== 'monitor' ? 'hidden' : ''">
                <serial-monitor class="flex flex-col h-full"></serial-monitor>
            </div>

        </div>

    </div>

</div>

<!-- Overlay to close device menu when clicking outside -->
<div if.bind="showDeviceMenu" click.trigger="showDeviceMenu = false" class="fixed inset-0 z-40"></div>

<!-- Toast anchor — Syncfusion Toast is appended here at runtime -->
<div id="workspace-toast"></div>
