<div class="flex flex-col w-full h-full bg-[#0d1117] border-t border-white/10 overflow-hidden">

    <!-- \u2500\u2500 Header bar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->
    <div class="flex items-center gap-3 px-3 py-1.5 bg-gray-900/80 border-b border-white/10 shrink-0">
        <!-- Terminal icon -->
        <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span class="text-white text-sm font-semibold">Device Monitor</span>
        <!-- Status badge -->
        <span class="text-xs font-mono" class.bind="statusColor">${statusText}</span>

        <div class="flex-1"></div>

        <!-- Quick commands — collapsible row -->
        <div class="flex flex-wrap items-center gap-1">
            <!-- Status group -->
            <button repeat.for="qc of quickCommands" click.trigger="sendQuickCommand(qc.cmd)" title="Send: ${qc.cmd}"
                class="px-2 py-0.5 rounded text-xs font-mono transition-colors" class.bind="qc.group === 'estop'
                        ? 'bg-red-700/70 hover:bg-red-600 text-red-100'
                        : qc.group === 'power'
                        ? 'bg-blue-700/50 hover:bg-blue-600/70 text-blue-200'
                        : qc.group === 'exrail'
                        ? 'bg-purple-700/50 hover:bg-purple-600/70 text-purple-200'
                        : 'bg-white/5 hover:bg-white/15 text-gray-300'">
                ${qc.label}
            </button>
        </div>
    </div>

    <!-- \u2500\u2500 xterm.js terminal \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 -->
    <div ref="terminalEl" class="flex-1 overflow-hidden p-1" style="min-height: 0;"></div>

</div>
