<template>
    <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-slate-900 rounded-2xl border border-white/10 w-full max-w-md shadow-2xl">

            <!-- Header -->
            <div class="px-6 pt-6 pb-4 border-b border-white/10">
                <h2 class="text-white text-lg font-semibold">${portOnly ? 'Select Port' : 'Select Your Board'}</h2>
                <p class="text-blue-300/70 text-sm mt-1" if.bind="!portOnly">
                    Choose the board connected to your computer. This will be saved in
                    <span class="font-mono text-blue-300">config.h</span>
                    so you won't be asked again.
                </p>
                <p class="text-blue-300/70 text-sm mt-1" if.bind="portOnly">
                    The board type was identified from your
                    <span class="font-mono text-blue-300">config.h</span>.
                    Select the port it is connected to.
                </p>
            </div>

            <!-- Body -->
            <div class="px-6 py-4 min-h-[140px] flex flex-col justify-center">

                <!-- Scanning -->
                <div if.bind="scanning" class="flex items-center gap-3 text-blue-300/70 text-sm">
                    <svg class="w-4 h-4 animate-spin text-blue-400" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.37 0 0 5.37 0 12h4z" />
                    </svg>
                    Scanning for connected boards…
                </div>

                <!-- Scan error -->
                <div if.bind="!scanning && scanError" class="text-red-400 text-sm">${scanError}</div>

                <!-- Board list -->
                <div if.bind="!scanning && !scanError && boards.length > 0" class="flex flex-col gap-2">
                    <div repeat.for="board of boards" click.trigger="selectBoard(board)" class="flex items-center gap-3 rounded-xl px-4 py-3 border cursor-pointer transition-all
                               ${selectedBoard === board
                                   ? 'bg-blue-600/20 border-blue-500/60 text-white'
                                   : 'bg-white/5 border-white/10 text-gray-300 hover:bg-white/10'}">
                        <div class="w-2 h-2 rounded-full shrink-0
                                    ${selectedBoard === board ? 'bg-blue-400' : 'bg-gray-600'}"></div>
                        <div class="min-w-0">
                            <p class="font-medium text-sm truncate">${board.name}</p>
                            <p class="text-xs font-mono mt-0.5
                                      ${selectedBoard === board ? 'text-blue-300/70' : 'text-gray-500'}">
                                ${board.port} &middot; ${board.fqbn}
                            </p>
                        </div>
                    </div>
                </div>

                <!-- No boards found -->
                <div if.bind="!scanning && !scanError && boards.length === 0"
                    class="text-center text-sm text-gray-400 py-2">
                    <p class="mb-1">No boards detected.</p>
                    <p class="text-gray-500 text-xs">
                        Connect your board and click
                        <button click.trigger="scan()"
                            class="underline text-blue-400 hover:text-blue-300 cursor-pointer bg-transparent border-none p-0">
                            Scan again
                        </button>, or continue without one.
                    </p>
                </div>

            </div>

            <!-- Footer -->
            <div class="px-6 pb-6 pt-2 flex items-center justify-between gap-3">
                <button click.trigger="cancel()"
                    class="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-white/10 transition-colors">
                    Cancel
                </button>
                <div class="flex gap-2">
                    <button click.trigger="skip()"
                        class="px-4 py-2 rounded-lg text-sm text-gray-300 bg-white/5 hover:bg-white/10 border border-white/10 transition-colors">
                        Continue without device
                    </button>
                    <button click.trigger="confirm()" disabled.bind="boards.length === 0 || scanning" class="px-4 py-2 rounded-lg text-sm font-semibold transition-colors
                               ${boards.length === 0 || scanning
                                   ? 'bg-blue-600/30 text-blue-300/40 cursor-not-allowed'
                                   : 'bg-blue-600 hover:bg-blue-500 text-white cursor-pointer'}">
                        Use This Board
                    </button>
                </div>
            </div>

        </div>
    </div>
</template>
