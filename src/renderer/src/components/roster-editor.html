<template>
    <!-- Tab strip: Visual | Raw -->
    <div class="flex flex-col flex-1 min-h-0 overflow-hidden">

        <div class="flex items-center gap-0 border-b border-white/10 bg-gray-900/60 shrink-0 px-2">
            <button click.trigger="setTab('visual')"
                class="px-4 py-2.5 text-sm font-medium border-b-2 transition-all focus:outline-none"
                class.bind="activeTab === 'visual' ? 'border-blue-500 text-white' : 'border-transparent text-gray-400 hover:text-white'">
                Visual
            </button>
            <button click.trigger="setTab('raw')"
                class="px-4 py-2.5 text-sm font-medium border-b-2 transition-all focus:outline-none"
                class.bind="activeTab === 'raw' ? 'border-blue-500 text-white' : 'border-transparent text-gray-400 hover:text-white'">
                Raw
            </button>
            <span class="ml-auto flex items-baseline gap-1.5 px-3 py-2">
                <span class="text-xs text-gray-400">${roster.length} entries</span>
                <span class="text-xs text-gray-600 font-mono">myRoster.h</span>
            </span>
        </div>

        <!-- ── Visual tab ─────────────────────────────────────────────────── -->
        <div if.bind="activeTab === 'visual'" style="flex:1;min-height:0;overflow:hidden;">
            <div id="roster-splitter" style="height:100%;width:100%;">

                <!-- Sidebar: entry list -->
                <div class="flex flex-col overflow-hidden border-r border-white/10 bg-gray-900/40">
                    <div class="flex items-center px-3 py-2.5 border-b border-white/10">
                        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider flex-1">Roster
                            Entries</span>
                        <button click.trigger="addEntry()"
                            class="w-6 h-6 rounded bg-blue-600 hover:bg-blue-500 text-white font-bold text-lg flex items-center justify-center leading-none transition-colors"
                            title="Add new roster entry">+</button>
                    </div>

                    <nav class="flex flex-col gap-0.5 overflow-y-auto flex-1 p-1.5" aria-label="Roster entries">
                        <a repeat.for="entry of roster" click.trigger="selectEntry(entry)"
                            class="flex items-center justify-between gap-2 px-2.5 py-2 rounded text-sm cursor-pointer transition-colors"
                            class.bind="editBuffer && roster.indexOf(entry) === editBufferIndex
                            ? 'bg-blue-900/60 text-white font-medium'
                            : 'text-gray-300 hover:bg-white/5 hover:text-white'">
                            <span class="flex-1 min-w-0 truncate">${entry.name}</span>
                            <span class="text-xs text-gray-500 shrink-0 font-mono">${entry.dccAddress}</span>
                            <span
                                class="px-1.5 py-0.5 text-xs rounded-full bg-gray-700 text-gray-300 shrink-0">${getRealFunctionCount(entry)}</span>
                            <button
                                class="shrink-0 w-5 h-5 flex items-center justify-center rounded text-gray-600 hover:bg-red-500/20 hover:text-red-400 transition-colors"
                                click.trigger="removeEntryByIndex($index, $event)" title="Remove">×</button>
                        </a>
                    </nav>

                    <div if.bind="roster.length === 0" class="flex-1 flex items-center justify-center p-4">
                        <p class="text-gray-600 text-xs text-center">No entries.<br>Click + to add one.</p>
                    </div>
                </div>

                <!-- Detail panel -->
                <div class="flex flex-col overflow-hidden flex-1">
                    <div if.bind="editBuffer" class="flex flex-col flex-1 min-h-0 overflow-hidden">

                        <!-- Sticky top: error banner + main fields -->
                        <div class="flex flex-col gap-4 p-4 shrink-0">
                            <!-- Error banner -->
                            <div if.bind="errorMessage"
                                class="px-3 py-2 bg-red-950/60 border border-red-500/40 rounded-md text-red-300 text-sm">
                                ${errorMessage}
                            </div>

                            <!-- Main fields -->
                            <div class="bg-gray-800/50 border border-white/10 rounded-lg p-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="flex flex-col gap-1.5">
                                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wide">DCC
                                            Address</label>
                                        <input type="number"
                                            class="bg-gray-900 border border-white/15 text-gray-100 rounded-md px-2.5 py-1.5 text-sm w-24 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-colors"
                                            value.bind="dccAddressInput" input.trigger="onDccAddressInput()"
                                            blur.trigger="onDccAddressBlur()" />
                                    </div>
                                    <div class="flex flex-col gap-1.5">
                                        <label
                                            class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Name</label>
                                        <input type="text"
                                            class="bg-gray-900 border border-white/15 text-gray-100 rounded-md px-2.5 py-1.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-colors"
                                            value.bind="editBuffer.name" blur.trigger="onNameBlur()" />
                                    </div>
                                    <div class="flex flex-col gap-1.5 col-span-2">
                                        <label
                                            class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Comment</label>
                                        <input type="text"
                                            class="bg-gray-900 border border-white/15 text-gray-100 rounded-md px-2.5 py-1.5 text-sm placeholder-gray-600 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/30 transition-colors"
                                            value.bind="editBuffer.comment"
                                            placeholder="Optional comment (appears after // in file)"
                                            blur.trigger="onCommentBlur()" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Functions - fills remaining space and scrolls -->
                        <div class="flex flex-col flex-1 min-h-0 overflow-hidden gap-2 px-4 pb-4">
                            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide shrink-0">Functions
                                (${editBuffer.functions.length})</h3>

                            <div class="flex flex-col gap-1.5 flex-1 min-h-0 overflow-y-auto pr-1">
                                <div repeat.for="func of editBuffer.functions"
                                    class="flex gap-2 items-center px-3 py-2 bg-gray-800/40 border border-white/10 rounded cursor-grab transition-all hover:border-white/20"
                                    class.bind="$index === draggedIndex ? 'opacity-40' : ''" draggable="true"
                                    dragstart.trigger="dragStart($index, $event)" dragover.trigger="dragOver($event)"
                                    drop.trigger="drop($index, $event)" dragend.trigger="dragEnd()">
                                    <span class="text-xs font-mono text-gray-500 w-7 shrink-0">F${$index}</span>
                                    <input type="text"
                                        class="flex-1 bg-gray-900 border border-white/10 text-gray-100 rounded px-2 py-1 text-xs outline-none focus:border-blue-500 transition-colors"
                                        value.bind="func.name" blur.trigger="updateFunctionName($index)"
                                        placeholder="${func.noFunction ? '(no function)' : 'Function name'}"
                                        disabled.bind="func.noFunction" />
                                    <label
                                        class="flex items-center gap-1 text-xs text-gray-400 cursor-pointer whitespace-nowrap shrink-0">
                                        <input type="checkbox" class="w-3.5 h-3.5" checked.bind="func.isMomentary"
                                            change.trigger="toggleMomentary($index)" />
                                        Momentary
                                    </label>
                                    <button
                                        class="w-6 h-6 flex items-center justify-center rounded bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white text-sm font-bold transition-colors shrink-0"
                                        click.trigger="removeFunction($index)" title="Remove">×</button>
                                </div>
                            </div>

                            <!-- Add function row -->
                            <div if.bind="editBuffer.functions.length < 29"
                                class="shrink-0 flex gap-2 items-center px-3 py-2 bg-green-500/5 border border-green-500/30 rounded hover:bg-green-500/10 transition-colors">
                                <span
                                    class="text-xs font-mono text-gray-500 w-7 shrink-0">F${editBuffer.functions.length}</span>
                                <input type="text"
                                    class="flex-1 bg-gray-900 border border-white/10 text-gray-100 rounded px-2 py-1 text-xs outline-none focus:border-blue-500 transition-colors"
                                    value.bind="newFunctionName" placeholder="New function name"
                                    disabled.bind="newFunctionNoFunction"
                                    keydown.trigger="handleAddFunctionKeydown($event)" />
                                <label
                                    class="flex items-center gap-1 text-xs text-gray-400 cursor-pointer whitespace-nowrap shrink-0">
                                    <input type="checkbox" class="w-3.5 h-3.5" checked.bind="newFunctionIsMomentary"
                                        keydown.trigger="handleAddFunctionKeydown($event)" />
                                    Momentary
                                </label>
                                <label
                                    class="flex items-center gap-1 text-xs text-gray-400 cursor-pointer whitespace-nowrap shrink-0">
                                    <input type="checkbox" class="w-3.5 h-3.5" checked.bind="newFunctionNoFunction"
                                        keydown.trigger="handleAddFunctionKeydown($event)" />
                                    No Fn
                                </label>
                                <button
                                    class="w-6 h-6 flex items-center justify-center rounded bg-green-500/20 hover:bg-green-500 text-green-400 hover:text-white text-sm font-bold transition-colors shrink-0 disabled:opacity-40 disabled:cursor-not-allowed"
                                    click.trigger="addFunction()"
                                    disabled.bind="!newFunctionNoFunction && newFunctionName.trim() === ''"
                                    title="Add function">+</button>
                            </div>
                        </div>

                    </div>

                    <div if.bind="!editBuffer" class="flex-1 flex items-center justify-center text-gray-600 text-sm">
                        <p if.bind="roster.length > 0">Select a roster entry to edit it.</p>
                        <p if.bind="roster.length === 0">No entries. Click + to add one.</p>
                    </div>
                </div>

            </div><!-- end #roster-splitter -->
        </div><!-- end visual tab -->
        <div if.bind="activeTab === 'raw'" class="flex flex-col flex-1 min-h-0 overflow-hidden">
            <monaco-editor component.ref="rawEditor" value.to-view="rawSnapshot" language="cpp" filename="myRoster.h"
                on-text-change.bind="onRawChange"></monaco-editor>
        </div>

    </div>
</template>
