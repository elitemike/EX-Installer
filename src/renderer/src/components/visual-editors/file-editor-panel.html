                    class="px-2 py-0.5 rounded text-xs bg-green-500/10 text-green-400 border border-green-500/20">Editable</span>
                <span class="ml-auto text-xs text-gray-600">Managed sections regenerate automatically</span>

        <div if.bind="currentView === 'sensors'" class="flex flex-col flex-1 overflow-hidden">

        <div if.bind="currentView === 'sequences'" class="flex flex-col flex-1 overflow-hidden">
