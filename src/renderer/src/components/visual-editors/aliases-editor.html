<template>
    <div class="flex flex-col flex-1 min-h-0 overflow-hidden">

        <div class="flex items-center gap-0 border-b border-white/10 bg-gray-900/60 shrink-0 px-2">
            <button click.trigger="setTab('visual')"
                class="px-4 py-2.5 text-sm font-medium border-b-2 transition-all focus:outline-none"
                class.bind="activeTab === 'visual' ? 'border-blue-500 text-white' : 'border-transparent text-gray-400 hover:text-white'">
                Visual
            </button>
            <button click.trigger="setTab('raw')"
                class="px-4 py-2.5 text-sm font-medium border-b-2 transition-all focus:outline-none"
                class.bind="activeTab === 'raw' ? 'border-blue-500 text-white' : 'border-transparent text-gray-400 hover:text-white'">
                Raw
            </button>
            <span class="ml-auto flex items-baseline gap-1.5 px-3 py-2">
                <span class="text-xs text-gray-400">${state.aliases.length} entries</span>
                <span class="text-xs text-gray-600 font-mono">myAliases.h</span>
            </span>
        </div>

        <div class.bind="activeTab === 'visual' ? 'flex flex-1 min-h-0 overflow-hidden' : 'hidden'"
            style="flex:1;min-height:0;overflow:hidden;">
            <div class="p-3 overflow-auto flex-1">
                <div class="flex items-center justify-between mb-3">
                    <div></div>
                    <button class="btn" click.trigger="addAlias()">Add Alias</button>
                </div>
                <div if.bind="errorMessage"
                    class="mb-3 px-3 py-2 bg-red-950/60 border border-red-500/40 rounded-md text-red-300 text-sm">
                    ${errorMessage}
                </div>
                <div repeat.for="a of state.aliases" class="mb-2 p-2 border rounded bg-gray-800">
                    <div class="flex gap-2 items-center">
                        <input value.two-way="a.name" blur.trigger="commitAlias($index)" placeholder="NAME"
                            class="w-40" />
                        <input value.two-way="a.value" blur.trigger="commitAlias($index)" placeholder="VALUE"
                            class="flex-1" />
                        <span
                            class="text-xs px-2 py-1 rounded bg-gray-700 text-gray-300 min-w-24 text-center">${getAliasTypeLabel(a)}</span>
                        <button class="btn ml-2" click.trigger="removeAlias($index)">Delete</button>
                    </div>
                </div>
                <div if.bind="state.aliases.length === 0" class="text-xs text-gray-500 p-3">No aliases. Click Add Alias.
                </div>
            </div>
        </div>

        <div class.bind="activeTab === 'raw' ? 'flex flex-col flex-1 min-h-0 overflow-hidden' : 'hidden'">
            <monaco-editor component.ref="rawEditor" value.to-view="rawSnapshot" language="cpp" filename="myAliases.h"
                on-text-change.bind="onRawChange"></monaco-editor>
        </div>

    </div>
</template>
